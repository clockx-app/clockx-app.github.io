<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B5FFF"/>
      <stop offset="100%" stop-color="#0A66FF"/>
    </linearGradient>
  </defs>
  <!-- Background is transparent for better adaptability on tabs -->
  <circle cx="32" cy="32" r="24" fill="url(#g)"/>
  <!-- Minute hand -->
  <line x1="32" y1="32" x2="47" y2="39" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <!-- Hour hand -->
  <line x1="32" y1="32" x2="32" y2="18" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <!-- Center cap -->
  <circle cx="32" cy="32" r="3" fill="#ffffff"/>
</svg>
